name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.lock --strict

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |
            --recursive
            --lockfile=requirements.lock
            ./

  transitive-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Resolve transitive deps
        run: |
          pip install uv
          uv pip compile pyproject.toml --output-file /tmp/full-deps.txt
      - name: OSV scanner on transitive deps
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |
            --lockfile=/tmp/full-deps.txt
