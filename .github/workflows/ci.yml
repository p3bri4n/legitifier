name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check data files are in sync
        run: python scripts/sync_data.py --check

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy legitifier_pkg --ignore-missing-imports --no-error-summary
        continue-on-error: true   # informational only for now

      - name: Tests + coverage
        run: |
          pytest tests/ --cov=legitifier_pkg --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: .coverage
