id: hardcoded_secrets
category: code_quality
weight: 1.1
severity: critical
description: >
  Detects API keys, tokens or credentials hardcoded directly in source files.
  This indicates either malicious intent (stealing user credentials) or
  extreme negligence. Either way, a strong scam signal.
  Source: Wall-of-Shames scammer-analysis-guide.

inputs:
  - github.code_snippets

thresholds:
  # Patterns that suggest a hardcoded secret (value must follow the pattern)
  secret_patterns:
    - "sk-proj-"           # OpenAI project key
    - "sk-"                # OpenAI legacy key
    - "OPENAI_KEY = \""
    - "OPENAI_API_KEY = \""
    - "api_key = \"sk-"
    - "TELEGRAM_TOKEN = \""
    - "bot_token = \""
    - "anthropic_key = \""
    - "ANTHROPIC_API_KEY = \""
    - "Bearer sk-"
    - "AIza"               # Google API key prefix

  # False positive guards — skip if key looks like a placeholder
  placeholder_patterns:
    - "YOUR_API_KEY"
    - "your-api-key"
    - "INSERT_KEY"
    - "sk-xxxx"
    - "sk-..."
    - "<API_KEY>"
    - "xxxxxxxx"

scoring:
  method: step
  score_if_triggered: 80
  score_if_clean: 0

evidence_template: >
  Hardcoded secret detected: {secret_matches}

tags: [secrets, api-keys, credentials, security]
severity: critical
