# legitifier search presets
# Each preset defines a GitHub search query targeting suspicious repositories.

presets:
  scam-hunter:
    description: "AI repos with high stars but very low forks — classic scam ratio"
    query: "topic:ai stars:>200 forks:<20 created:>2024-01-01 language:python"

  vibe-coding:
    description: "Repos with many stars but no recent activity — vibe coding / portfolio padding"
    query: "topic:ai stars:>1000 pushed:<2024-06-01"

  fresh-suspect:
    description: "Recently created repos with suspicious star counts"
    query: "topic:llm stars:>500 created:>2024-06-01"

  wormgpt-variants:
    description: "WormGPT / DarkGPT clone pattern — run multiple times for each variant"
    query: "topic:worm-gpt stars:>5"

  darkgpt-variants:
    description: "DarkGPT clone pattern"
    query: "topic:darkgpt stars:>5"

  fraudgpt-variants:
    description: "FraudGPT clone pattern"
    query: "topic:fraudgpt stars:>5"

  api-wrapper:
    description: "Repos claiming to be local AI but likely just API wrappers"
    query: "topic:local-llm stars:>100 forks:<15 language:python"

  educational:
    description: "Educational Python repos with tutorial topic"
    query: "topic:tutorial stars:>50 language:python"

  educational-cs:
    description: "Computer science educational repos"
    query: "topic:computer-science stars:>100 language:python"
